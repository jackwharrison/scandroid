<!DOCTYPE html>
<html lang="{{ lang }}" {% if lang == 'ar' %}dir="rtl"{% endif %}>
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <title>121 Scan | Program Selector</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --ink: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --navy: #002855;
      --violet: #7c3aed;
      --shadow: 0 10px 30px rgba(0,0,0,0.06);
      --radius: 16px;
    }

    html { height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      display: flex;
      flex-direction: column;
    }

    /* ---------- HEADER ---------- */
    header {
      background-color: var(--navy);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      position: relative;
      z-index: 3000;
    }

    .header-left {
      display: flex;
      align-items: center;
    }

    .header-left img {
      height: 32px;
      width: auto;
      object-fit: contain;
    }

    .header-title {
      flex: 1;
      padding-left: 20px;
      font-size: 1.1rem;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .title-bold    { font-weight: 800; letter-spacing: 0.3px; }
    .title-divider { opacity: 0.8; }
    .title-program { font-weight: 300; opacity: 0.95; }

    /* ---------- HEADER RIGHT ---------- */
    .header-account-wrapper {
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
    }

    .lang-select select {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .account-btn {
      background: transparent;
      border: none;
      color: #ffffff;
      padding: 6px 10px;
      border-radius: 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border 0.2s ease;
    }

    .account-btn:hover { border: 1px solid rgba(255,255,255,0.9); }
    .account-btn.active .account-arrow-svg { transform: rotate(180deg); }

    .account-icon-svg {
      width: 16px; height: 16px;
      filter: invert(100%);
    }

    .account-arrow-svg {
      width: 12px; height: 12px;
      filter: invert(100%);
      transition: transform 0.15s ease;
    }

    /* ---------- ACCOUNT DROPDOWN ---------- */
    .account-menu {
      position: absolute;
      background: #ffffff;
      top: 48px;
      right: 0;
      min-width: 220px;
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
      z-index: 3001;
      padding: 10px 0;
    }

    .hidden { display: none; }

    .account-menu-item {
      padding: 10px 16px;
      font-size: 14px;
      text-decoration: none;
      color: #000;
      display: block;
    }

    .account-menu-item:hover { background: #f2f2f2; }
    .account-menu-divider { border-top: 1px solid #e5e7eb; margin: 6px 0; }
    .user-info { font-size: 13px; }

    /* ---------- MAIN ---------- */
    .wrapper {
      max-width: 640px;
      margin: 32px auto;
      padding: 0 20px;
      flex: 1;
      box-sizing: border-box;
      width: 100%;
    }

    h1 {
      text-align: center;
      margin: 0 0 8px 0;
      font-size: 1.6rem;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    /* ---------- PROGRAM LIST ---------- */
    .program-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .program-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      cursor: pointer;
      text-decoration: none;
      color: var(--ink);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .program-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px rgba(0,0,0,0.10);
      border-color: var(--violet);
    }

    .program-card:active { transform: translateY(0); }

    .program-title {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .program-arrow {
      width: 20px; height: 20px;
      opacity: 0.35;
      flex-shrink: 0;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .program-card:hover .program-arrow {
      opacity: 0.7;
      transform: translateX(3px);
    }

    /* ---------- FOOTER ---------- */
    footer {
      padding: 12px 18px;
      background-color: var(--navy);
      color: white;
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 4px;
    }

    /* ---------- MOBILE ---------- */
    @media (max-width: 576px) {
      header {
        flex-direction: column;
        gap: 8px;
        padding: 12px;
        align-items: center;
      }

      .header-title {
        padding-left: 0;
        justify-content: center;
      }

      .header-account-wrapper {
        flex-direction: row;
        gap: 10px;
        width: 100%;
        justify-content: center;
      }

      .wrapper {
        margin: 20px auto;
        padding: 0 16px;
      }

      h1 { font-size: 1.3rem; }

      .program-card { padding: 18px 20px; }
      .program-title { font-size: 1rem; }

      footer {
        flex-direction: column;
        text-align: center;
        gap: 4px;
        padding: 14px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="header-left">
    <img src="/instance-static/ns1.png" alt="">
  </div>

  <div class="header-title">
    <span class="title-bold">121 Scan</span>
    {% if national_society %}
    <span class="title-divider">|</span>
    <span class="title-program">{{ national_society }}</span>
    {% endif %}
  </div>

  <div class="header-account-wrapper">
    <form method="get" action="/fsp-programs" class="lang-select">
      <select name="lang" onchange="this.form.submit()">
        <option value="en" {% if lang == 'en' %}selected{% endif %}>English</option>
        <option value="fr" {% if lang == 'fr' %}selected{% endif %}>Français</option>
        <option value="ar" {% if lang == 'ar' %}selected{% endif %}>العربية</option>
      </select>
    </form>

    <div class="account-dropdown">
      <button class="account-btn" onclick="toggleAccountDropdown()" type="button">
        <img src="{{ url_for('static', filename='icons/user.svg') }}" class="account-icon-svg">
        Account
        <img src="{{ url_for('static', filename='icons/arrow.svg') }}" class="account-arrow-svg">
      </button>

      <div id="account-menu" class="account-menu hidden">
        <div class="account-menu-item user-info">
          <strong>Logged in as:</strong><br>
          {{ username }}
        </div>
        <div class="account-menu-divider"></div>
        <a href="/fsp-logout?lang={{ lang }}" class="account-menu-item">{{ t.logout }}</a>
      </div>
    </div>
  </div>
</header>

<div class="wrapper">
  <h1>{{ t.program_select_title }}</h1>
  <p class="subtitle">{{ t.program_select_subtitle }}</p>

  <div class="program-list">
    {% for p in programs %}
      <a class="program-card" href="/select-program/{{ p.id }}?lang={{ lang }}">
        <div class="program-title">{{ p.title }}</div>
        <svg class="program-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </a>
    {% endfor %}
  </div>
</div>

<footer>
  <div>{{ t.footer_dev }}</div>
  <div>{{ t.footer_support }}</div>
</footer>

<script>
function toggleAccountDropdown() {
  const menu = document.getElementById('account-menu');
  const btn = document.querySelector('.account-btn');
  menu.classList.toggle('hidden');
  btn.classList.toggle('active');
}

document.addEventListener('click', function(e) {
  const menu = document.getElementById('account-menu');
  const btn = document.querySelector('.account-btn');
  if (btn && !btn.contains(e.target)) {
    menu.classList.add('hidden');
    btn.classList.remove('active');
  }
});
</script>

</body>
</html>
